<!DOCTYPE html>
<html class="light-theme">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="panel.css">
</head>
<body>

  <!-- NAVIGATION BAR -->
  <div class="nav-controls">
    <button class="nav-btn" id="nav-back" data-tooltip="Back" data-tooltip-pos="down">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
    </button>
    <button class="nav-btn" id="nav-forward" data-tooltip="Forward" data-tooltip-pos="down">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
    </button>
    <button class="nav-btn" id="nav-reload" data-tooltip="Reload" data-tooltip-pos="down">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 4v6h-6"/><path d="M1 20v-6h6"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
    </button>
    <div class="omnibox-wrapper">
        <input type="text" id="omnibox-input" class="omnibox" placeholder="Search or enter URL" autocomplete="off">
    </div>
    <button class="icon-btn" id="zen-mode-btn" data-tooltip="Full Screen" data-tooltip-pos="down">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h6v6"></path><path d="M9 21H3v-6"></path><path d="M21 3l-7 7"></path><path d="M3 21l7-7"></path></svg>
    </button>
  </div>

  <div id="drag-hint" class="drag-hint">
    <span>Drop to move</span>
  </div>

  <!-- TOP NAV (WORKSPACES) -->
  <header class="top-nav">
    <button class="icon-btn" id="create-ws-btn" data-tooltip="New Workspace" data-tooltip-pos="down">
       <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
    </button>

    <div class="workspaces-list" id="workspaces-bar"></div>

    <button class="icon-btn" id="all-ws-toggle" data-tooltip="All Workspaces" data-tooltip-pos="down">
       <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"></line><line x1="8" y1="12" x2="21" y2="12"></line><line x1="8" y1="18" x2="21" y2="18"></line><line x1="3" y1="6" x2="3.01" y2="6"></line><line x1="3" y1="12" x2="3.01" y2="12"></line><line x1="3" y1="18" x2="3.01" y2="18"></line></svg>
    </button>
  </header>

  <!-- SEARCH ROW + TOGGLE -->
  <div class="search-container">
    <div class="toggle-wrapper" data-tooltip="Manage Tabs" data-tooltip-pos="down">
      <input type="checkbox" class="toggle-button" id="master-toggle" role="switch" />
    </div>

    <!-- RESTORE BUTTON (Undo Arrow) -->
    <button class="icon-btn" id="restore-btn" data-tooltip="Restore closed tab" data-tooltip-pos="down">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"></path>
            <path d="M3 3v5h5"></path>
        </svg>
    </button>
    
    <div class="search-input-wrapper">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
      <input type="text" class="search-input" placeholder="Find..." id="search-input" autocomplete="off">
    </div>

    <button class="icon-btn" id="settings-toggle" data-tooltip="Settings" data-tooltip-pos="down">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor" stroke="none">
        <path d="M12 15.5A3.5 3.5 0 0 1 8.5 12 3.5 3.5 0 0 1 12 8.5a3.5 3.5 0 0 1 3.5 3.5 3.5 3.5 0 0 1-3.5 3.5m7.43-2.53c.04-.32.07-.66.07-1s-.03-.68-.07-1l2.11-1.63c.19-.15.24-.42.12-.64l-2-3.46c-.12-.22-.39-.31-.61-.22l-2.49 1a7.306 7.306 0 0 0-1.69-.98l-.38-2.65A.488.488 0 0 0 14 2h-4c-.25 0-.46.18-.49.42l-.38 2.65c-.61.25-1.17.59-1.69.98l-2.49-1c-.22-.09-.49 0-.61.22l-2 3.46c-.13.22-.07.49.12.64L4.57 11c-.04.32-.07.66-.07 1s.03.68.07 1l-2.11 1.63c-.19.15-.24.42-.12.64l2 3.46c.12.22.39.31.61.22l2.49-1c.52.4 1.08.73 1.69.98l.38 2.65c.03.24.24.42.49.42h4c.25 0 .46-.18.49-.42l.38-2.65c.61-.25 1.17-.59 1.69-.98l2.49 1c.22.09.49 0 .61-.22l2-3.46c.12-.22.07-.49-.12-.64l-2.11-1.63z"></path>
      </svg>
    </button>
  </div>

  <!-- MANAGEMENT PANEL -->
  <div class="management-panel" id="management-panel">
      <div class="mgmt-check-wrapper">
          <input type="checkbox" id="master-check" class="mgmt-checkbox">
      </div>
      
      <button class="mgmt-btn icon-only danger" id="bulk-delete" data-tooltip="Delete selected" data-tooltip-pos="down">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"></path><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"></path><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></svg>
      </button>
      
      <button class="mgmt-btn icon-only danger single-only arrow-trash" id="bulk-close-above" data-tooltip="Close tabs above" data-tooltip-pos="down">
          <svg class="trash-top" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"></path><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"></path><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"></path></svg>
          <svg class="arrow-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 19V5"></path><polyline points="5 12 12 5 19 12"></polyline></svg>
      </button>
      
      <button class="mgmt-btn icon-only danger single-only arrow-trash" id="bulk-close-below" data-tooltip="Close tabs below" data-tooltip-pos="down">
          <svg class="arrow-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 5v14"></path><polyline points="19 12 12 19 5 12"></polyline></svg>
          <svg class="trash-bottom" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"></path><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"></path><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"></path></svg>
      </button>

      <div class="mgmt-spacer"></div>

      <div class="dropdown-wrapper">
          <button class="mgmt-btn dropdown-btn" id="bulk-move-btn">
              <span>Move to</span>
              <svg class="dropdown-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"></polyline></svg>
          </button>
          <div class="dropdown-content" id="bulk-move-dropdown"></div>
      </div>

      <div class="dropdown-wrapper">
          <button class="mgmt-btn dropdown-btn" id="bulk-copy-btn">
              <span>Copy to</span>
              <svg class="dropdown-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"></polyline></svg>
          </button>
          <div class="dropdown-content" id="bulk-copy-dropdown"></div>
      </div>

      <button class="mgmt-btn icon-only split-only" id="bulk-split" data-tooltip="Split view" data-tooltip-pos="down">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><line x1="12" y1="3" x2="12" y2="21"></line></svg>
      </button>

      <button class="mgmt-btn icon-only" id="bulk-incognito" data-tooltip="Open in Incognito" data-tooltip-pos="down">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5c-7 0 -10 7 -10 7s3 7 10 7s10 -7 10 -7s-3 -7 -10 -7z"></path><circle cx="12" cy="12" r="3"></circle><path d="M3 3l18 18"></path></svg>
      </button>
  </div>

  <!-- PINNED BAR -->
  <div class="pinned-bar" id="pinned-bar">
      <div class="pinned-bar-icon">
          <svg viewBox="0 0 24 24" fill="currentColor" stroke="none"><path d="M16 12V4H17V2H7V4H8V12L6 14V16H11.2V22H12.8V16H18V14L16 12Z"/></svg>
      </div>
      <div class="pinned-tabs-scroll" id="pinned-tabs-scroll"></div>
  </div>

  <div class="tabs-container" id="tabs-list"></div>

  <!-- MENUS -->
  <div class="menu settings-menu" id="settings-menu">
    <div class="menu-header">
      <span class="menu-header-title">Settings</span>
      <button id="close-settings-menu" class="menu-close-btn" data-tooltip="Close" data-tooltip-pos="down">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
      </button>
    </div>
    <div style="padding: 0 12px 12px 12px;">
      <div class="theme-switcher">
        <input type="radio" id="light-theme" name="themes" value="light" checked />
        <label for="light-theme"><span><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>Light</span></label>
        
        <input type="radio" id="dark-theme" name="themes" value="dark" />
        <label for="dark-theme"><span><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>Dark</span></label>
        
        <input type="radio" id="black-theme" name="themes" value="black" />
        <label for="black-theme"><span><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon></svg>Black</span></label>
        <span class="slider"></span>
      </div>
    </div>
  </div>

  <div class="menu projects-dropdown" id="projects-dropdown">
      <div class="menu-header">
          <h2 class="menu-header-title">All Workspaces</h2>
          <button id="close-projects-menu" class="menu-close-btn" data-tooltip="Close" data-tooltip-pos="down">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
          </button>
      </div>
      <div style="padding: 0 12px 12px 12px;">
          <input type="text" id="project-search" placeholder="Filter workspaces..." class="mini-search">
      </div>
      <div class="projects-list-vertical" id="all-projects-list"></div>
  </div>

  <dialog id="new-ws-dialog">
    <div class="dialog-content">
      <h3 class="dialog-title" id="dialog-title">New Workspace</h3>
      <input type="text" id="new-ws-name" placeholder="Workspace name..." class="dialog-input">
      <div class="dialog-actions">
        <button type="button" id="cancel-create-ws" class="btn-secondary">Cancel</button>
        <button type="button" id="dialog-submit-btn" class="btn-primary">Create</button>
      </div>
    </div>
  </dialog>

  <script src="panel.js" type="module"></script>
</body>
</html>
